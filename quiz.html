<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz SAEB Tudo</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/quizt.css" />
</head>
<body>
  <div class="container" id="container">

    <!-- SPLASH -->
    <div id="splash" class="splash">
      <img src="imagens/logo saeb tudo.svg" alt="SAEB Tudo" class="splash-logo">
    </div>

    <!-- OVERLAY DO MENU -->
    <div id="overlay"></div>

    <!-- MENU LATERAL -->
    <aside id="menuLateral">
      <div class="menu-topo">
        <h3 id="tituloMenuMateria">Matéria</h3>

        <div class="menu-info-box">
          <p class="menu-info-label">Modo</p>
          <p class="menu-info-valor" id="modoMenu">Rápido</p>
        </div>

        <div class="menu-info-box">
          <p class="menu-info-label">Tempo limite</p>
          <p class="menu-info-valor" id="tempoLimiteMenu">05:00</p>
        </div>

        <div class="menu-info-box">
          <p class="menu-info-label">Questões</p>
          <p class="menu-info-valor" id="quantidadeQuestoesMenu">5</p>
        </div>

        <button class="menu-item" id="btnVerQuestoes" type="button">
          Ver questões
        </button>

        <button class="menu-item sair" id="btnSairDesafio" type="button">
          Sair do treino
        </button>
      </div>

      <div class="menu-logo">
        <img src="imagens/logo saeb tudo.svg" alt="SAEB Tudo" />
      </div>
    </aside>

    <!-- APP -->
    <div id="app">
      <header class="topo">
        <span id="contador">1/5</span>
        <h1 id="tituloTopo">Língua Portuguesa</h1>
        <button id="abrirMenu" class="menu-btn" type="button">☰</button>
      </header>

      <div class="barra">
        <div id="progresso"></div>
      </div>

      <main class="quiz">
        <div id="statusCarregamento" class="status-carregamento">
          Carregando questões...
        </div>

        <div id="conteudoQuiz" class="conteudo-quiz oculto">
          <p id="enunciado" class="enunciado"></p>

          <img
            id="imagemQuestao"
            class="imagem-questao oculto"
            alt="Imagem da questão"
          />

          <div id="alternativas" class="alternativas"></div>
        </div>
      </main>

      <footer class="footer">
        <button id="btnAcao" disabled type="button">confirmar</button>
      </footer>
    </div>

    <!-- TELA FINAL -->
    <div id="telaFinal" class="tela-final oculto">
      <div class="final-conteudo">

        <h2 id="tituloFinal" class="titulo-final">Parabéns!</h2>

        <div class="cards-resultado">

          <div class="coluna-esquerda">
            <div class="card-final card-acertos">
              <div id="acertosFinal" class="numero-acertos">0/5</div>
              <div class="texto-acertos">Questões acertadas</div>
            </div>

            <div class="card-final card-tempo">
              <div id="tempoNumero" class="numero-tempo">0:00min</div>
              <div class="texto-tempo">tempo</div>
            </div>
          </div>

          <div class="card-final card-grafico">
            <div class="grafico-pizza" id="graficoPizza"></div>
            <div id="porcentagemFinal" class="numero-porcentagem">0%</div>
          </div>

        </div>

        <div class="botoes-finais">
          <button id="btnRefazer" class="btn-final btn-refazer" type="button">Refazer</button>
          <button id="btnVoltarHome" class="btn-final btn-sair" type="button">sair</button>
        </div>

      </div>
    </div>

  </div>

  <script src="js/quizt.js"></script>
</body>
</html>
