<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matemática</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/desafios-matematica.css">
</head>
<body>

  <div class="container">

    <!-- TOPO ROSA FIXO -->
    <div class="topo-rosa">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <main class="conteudo">

      <!-- CABEÇALHO -->
      <button class="btn-voltar" id="btnVoltar">

     <img src="imagens/seta-voltar.svg">

     </button>

        <div class="textos-cabecalho">
          <h1>Treine Matemática</h1>
          <p>escolha o tipo de treino</p>
        </div>
      </section>

      <!-- CARDS -->
      <section class="cards-treino">

        <div class="card-treino rapido" data-link="quiz.html?materia=matematica&modo=rapido">
          <div class="rodape-card">
            <button class="btn-card branco">Começar</button>
            <span class="tempo tempo-azul">5min</span>
          </div>
        </div>

        <div class="card-treino mini" data-link="quiz.html?materia=matematica&modo=mini">
          <div class="rodape-card">
            <button class="btn-card azul">Começar</button>
            <span class="tempo tempo-azul">15min</span>
          </div>
        </div>

        <div class="card-treino completo" data-link="quiz.html?materia=matematica&modo=completo">
          <div class="rodape-card">
            <button class="btn-card branco-laranja">Começar</button>
            <span class="tempo tempo-laranja">30min</span>
          </div>
        </div>

      </section>

    </main>

  </div>

  <script src="js/desafios-matematica.js"></script>
</body>
</html>
