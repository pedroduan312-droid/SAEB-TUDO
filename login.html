<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1 class="titulo">Login</h1>

        <form id="loginForm">

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <div class="linha-acoes">
    <a href="#" class="esqueci">Esqueci minha senha</a>
    <button type="submit" class="btn-login">Entrar</button>
</div>

        </form>

        <div class="divisor"><span>ou</span></div>

        <button class="btn-google">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
            Entrar com Google
        </button>

        <p class="criar-conta">
            Ainda não tem uma conta?
            <a href="#">Criar</a>
        </p>

    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
