<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/home.css">

</head>

<body>

<div class="container">

<!-- HEADER -->

<header class="header">

<div class="perfil">
<img src="imagens/user.png">
</div>

<div class="saudacao">
<h2 id="saudacao">Bom dia! Aluno</h2>
<p>Pronto pra praticar?</p>
</div>

</header>


<main class="conteudo">

<!-- DESAFIO DO DIA -->

<section class="desafio-card">

<div class="rodape">

<button id="btnDesafio">Começar desafio</button>

</div>

</section>


<!-- TREINE POR MATÉRIAS -->

<section class="materias">

<h3 class="titulo">Treine por Matérias</h3>

<div class="cards-materias">

<div class="card materia portugues" data-materia="portugues">

<div class="rodape">

<button class="btnMateria">Iniciar</button>

<span>20</span>

</div>

</div>


<div class="card materia matematica" data-materia="matematica">

<div class="rodape">

<button class="btnMateria">Iniciar</button>

<span>20</span>

</div>

</div>

</div>

</section>


<!-- QUESTÕES RÁPIDAS -->

<section class="rapido">

<h3 class="titulo">Questões Rápidas</h3>

<div class="card-rapido">

<div class="rodape">

<button id="btnRapido">Praticar</button>

<span>5</span>

</div>

</div>

</section>

</main>

    <!-- NAVBAR -->
    <nav class="navbar">

      <button class="nav-item ativo" data-page="home">
        <img src="imagens/home-active.svg" alt="Home">
      </button>

      <button class="nav-item" data-page="simulados">
        <img src="imagens/simulados.svg" class="icone-simulados" alt="Simulados">
      </button>

     <button class="nav-item" data-page="desempenho">
        <img src="imagens/desempenho.svg" alt="Desempenho">
      </button>

      <button class="nav-item" data-page="perfil">
        <img src="imagens/perfil.svg" alt="Perfil">
      </button>

    </nav>

  </div>

<script src="js/home.js"></script>

</body>
</html>
