<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta</title>

<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1 class="titulo">Criar Conta</h1>

        <form id="cadastroForm">

            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <div class="input-group">
                <label>Confirmar Senha</label>
                <input type="password" id="confirmar" placeholder="Confirme sua senha" required>
            </div>

            <div class="linha-acoes">
                <button type="submit" class="btn-login">
                    Criar Conta
                </button>
            </div>

        </form>

        <div class="divisor"><span>ou</span></div>

        <button class="btn-google" type="button" id="btnGoogleCadastro">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
            Cadastrar com Google
        </button>

        <p class="criar-conta">
            Já tem uma conta?
            <a href="login.html">Entrar</a>
        </p>

    </div>
</div>

<script src="js/cadastro.js"></script>
</body>
</html>
